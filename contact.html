<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact | Md Redwan Islam</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="page">
<section class="section">
  <div class="section-hdr"><span class="sec-num">07</span><h2 class="sec-title">Contact</h2><div class="sec-line"></div></div>
  <div class="g2" style="align-items:start;gap:3rem;">
    <div>
      <p style="color:var(--txt2);line-height:1.85;margin-bottom:2rem;font-size:.95rem;">Open to graduate engineering roles, CFD research collaborations, and PhD opportunities in the UK and internationally.</p>
      <div class="fc" id="clinks"></div>
    </div>
    <div class="fc">
      <div class="form-grp"><label>Your Name</label><input id="fn" placeholder="Jane Smith"></div>
      <div class="form-grp"><label>Your Email</label><input id="fe" type="email" placeholder="jane@company.com"></div>
      <div class="form-grp"><label>Subject</label><input id="fs" placeholder="Graduate Engineer Role"></div>
      <div class="form-grp"><label>Message</label><textarea id="fm" placeholder="Hello Redwan..."></textarea></div>
      <button class="btn btn-p" onclick="sendMsg()">Send via Email</button>
    </div>
  </div>
</section>
</div>
<footer id="footer"></footer>
<script src="assets/js/data.js"></script>
<script src="assets/js/render.js"></script>
<script>
renderNav('contact');renderFooter();
function renderContactLinks(){
  document.getElementById('clinks').innerHTML=`
    <a href="mailto:${DATA.email}" class="contact-link"><span class="cl-icon">EMAIL</span><span class="cl-val">${DATA.email}</span></a>
    <a href="${DATA.linkedin}" target="_blank" class="contact-link"><span class="cl-icon">LINKEDIN</span><span class="cl-val">linkedin.com/in/redwanislam98</span></a>
    <a href="${DATA.website}" target="_blank" class="contact-link"><span class="cl-icon">WEBSITE</span><span class="cl-val">${(DATA.website||'').replace('https://','')}</span></a>
    <a href="https://wa.me/${(DATA.whatsapp||'').replace(/\D/g,'')}" target="_blank" class="contact-link"><span class="cl-icon">WHATSAPP</span><span class="cl-val">${DATA.whatsapp}</span></a>
    ${DATA.cv_file?`<a href="${DATA.cv_file}" download class="btn btn-p" style="margin-top:.5rem;justify-content:center;text-align:center;">⬇ Download CV</a>`:''}`;
}
renderContactLinks();
function sendMsg(){
  const name=document.getElementById('fn').value.trim();
  const msg=document.getElementById('fm').value.trim();
  if(!name||!msg){alert('Fill in name and message.');return;}
  const subj=document.getElementById('fs').value||'Portfolio Enquiry';
  const email=document.getElementById('fe').value;
  const body=encodeURIComponent('Hi Redwan,\n\n'+msg+'\n\nBest,\n'+name+'\n'+email);
  window.location.href='mailto:'+DATA.email+'?subject='+encodeURIComponent(subj)+'&body='+body;
}
</script>
</body>
</html>
