<script>
renderNav('index');
renderFooter();

const parts=DATA.name.split(' ');
const last=parts.pop();
document.getElementById('hero-name').innerHTML=parts.join(' ')+'<br><span style="color:var(--cyan)">'+last+'</span><span class="cursor"></span>';
document.getElementById('hero-tag').textContent=DATA.tagline;
document.getElementById('hero-bio').textContent=DATA.bio[0];
document.getElementById('hero-btns').innerHTML=`
  <a href="mailto:${DATA.email}" class="btn btn-p">Get In Touch</a>
  <a href="${DATA.linkedin}" target="_blank" class="btn btn-o">LinkedIn</a>
  ${DATA.cv_file?`<a href="${DATA.cv_file}" download class="btn btn-o">⬇ Download CV</a>`:''}`;
document.getElementById('hero-stats').innerHTML=(DATA.stats||[]).map(s=>`
  <div class="stat-box" style="text-align:right;">
    <div class="stat-num">${s.num}</div>
    <div class="stat-lbl">${s.label}</div>
  </div>`).join('');
document.getElementById('about-photo').innerHTML=renderPhoto(190);
document.getElementById('about-bio').innerHTML=(DATA.bio||[]).map(b=>`<p style="color:var(--txt2);margin-bottom:1rem;line-height:1.85;">${b}</p>`).join('');
document.getElementById('about-det').innerHTML=renderDetails();

// ── GEAR ROTATION via requestAnimationFrame (cross-browser) ──
const gearBig   = document.getElementById('gear-big');
const gearSmall = document.getElementById('gear-small');
const gearTiny  = document.getElementById('gear-tiny');
let angleBig=0, angleSmall=0, angleTiny=0;
const CX_BIG=190, CY_BIG=200;
const CX_SM=340,  CY_SM=200;
const CX_TN=80,   CY_TN=370;

function animateGears(){
  angleBig   += 0.012;
  angleSmall -= 0.017;
  angleTiny  += 0.025;
  if(gearBig)   gearBig.setAttribute('transform',   `rotate(${angleBig}   ${CX_BIG} ${CY_BIG})`);
  if(gearSmall) gearSmall.setAttribute('transform', `rotate(${angleSmall} ${CX_SM}  ${CY_SM})`);
  if(gearTiny)  gearTiny.setAttribute('transform',  `rotate(${angleTiny}  ${CX_TN}  ${CY_TN})`);
  requestAnimationFrame(animateGears);
}
animateGears();
</script>
