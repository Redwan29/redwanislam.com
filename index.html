<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Md Redwan Islam | Portfolio</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>
<div class="page">

  <!-- HERO -->
  <div class="hero-wrap" style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:6rem 1.5rem 4rem;overflow:hidden;">

    <!-- GEAR + STREAMLINE SVG BACKGROUND -->
    <svg class="hero-svg" style="position:absolute;right:-60px;top:50%;transform:translateY(-50%);opacity:.13;pointer-events:none;width:520px;height:520px;" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Large gear -->
      <g class="gear-slow" style="transform-origin:200px 200px;">
        <circle cx="200" cy="200" r="130" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
        <circle cx="200" cy="200" r="90"  stroke="#00e5ff" stroke-width="1" fill="none" opacity=".5"/>
        <circle cx="200" cy="200" r="30"  stroke="#00e5ff" stroke-width="2" fill="none"/>
        <!-- Gear teeth -->
        <g stroke="#00e5ff" stroke-width="2" fill="none">
          <rect x="189" y="62"  width="22" height="18" rx="2"/>
          <rect x="189" y="320" width="22" height="18" rx="2"/>
          <rect x="62"  y="189" width="18" height="22" rx="2"/>
          <rect x="320" y="189" width="18" height="22" rx="2"/>
          <rect x="110" y="97"  width="18" height="18" rx="2" transform="rotate(45 119 106)"/>
          <rect x="268" y="97"  width="18" height="18" rx="2" transform="rotate(45 277 106)"/>
          <rect x="110" y="281" width="18" height="18" rx="2" transform="rotate(45 119 290)"/>
          <rect x="268" y="281" width="18" height="18" rx="2" transform="rotate(45 277 290)"/>
        </g>
        <!-- Spokes -->
        <line x1="200" y1="110" x2="200" y2="170" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="200" y1="230" x2="200" y2="290" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="110" y1="200" x2="170" y2="200" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="230" y1="200" x2="290" y2="200" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="143" y1="143" x2="183" y2="183" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="217" y1="217" x2="257" y2="257" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="257" y1="143" x2="217" y2="183" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
        <line x1="183" y1="217" x2="143" y2="257" stroke="#00e5ff" stroke-width="1" opacity=".6"/>
      </g>
      <!-- Small gear interlocking -->
      <g class="gear-ccw" style="transform-origin:352px 200px;">
        <circle cx="352" cy="200" r="62"  stroke="#00b8cc" stroke-width="1.5" fill="none"/>
        <circle cx="352" cy="200" r="42"  stroke="#00b8cc" stroke-width="1" fill="none" opacity=".5"/>
        <circle cx="352" cy="200" r="16"  stroke="#00b8cc" stroke-width="2" fill="none"/>
        <g stroke="#00b8cc" stroke-width="1.5" fill="none">
          <rect x="343" y="132" width="18" height="12" rx="1"/>
          <rect x="343" y="256" width="18" height="12" rx="1"/>
          <rect x="284" y="193" width="12" height="18" rx="1"/>
          <rect x="408" y="193" width="12" height="18" rx="1"/>
        </g>
        <line x1="352" y1="158" x2="352" y2="184" stroke="#00b8cc" stroke-width="1" opacity=".6"/>
        <line x1="352" y1="216" x2="352" y2="242" stroke="#00b8cc" stroke-width="1" opacity=".6"/>
        <line x1="310" y1="200" x2="336" y2="200" stroke="#00b8cc" stroke-width="1" opacity=".6"/>
        <line x1="368" y1="200" x2="394" y2="200" stroke="#00b8cc" stroke-width="1" opacity=".6"/>
      </g>
      <!-- CFD Streamlines -->
      <path d="M 20 300 Q 100 280 180 310 Q 260 340 340 300 Q 420 260 500 290" stroke="#0066cc" stroke-width="1.5" fill="none" opacity=".7" stroke-dasharray="600" style="animation:flow 4s linear infinite;"/>
      <path d="M 20 330 Q 110 305 190 335 Q 270 365 360 325 Q 440 285 520 315" stroke="#00e5ff" stroke-width="1" fill="none" opacity=".5" stroke-dasharray="600" style="animation:flow 5s linear infinite .8s;"/>
      <path d="M 20 360 Q 120 335 200 360 Q 290 385 380 350 Q 460 315 520 340" stroke="#00ccaa" stroke-width="1" fill="none" opacity=".4" stroke-dasharray="600" style="animation:flow 6s linear infinite 1.6s;"/>
      <path d="M 20 390 Q 130 365 210 388 Q 310 410 400 375 Q 470 345 520 368" stroke="#ff6600" stroke-width="1" fill="none" opacity=".3" stroke-dasharray="600" style="animation:flow 7s linear infinite 2.4s;"/>
      <!-- Dimension lines -->
      <line x1="60" y1="450" x2="340" y2="450" stroke="#1a4a6a" stroke-width="1"/>
      <line x1="60" y1="445" x2="60" y2="455" stroke="#1a4a6a" stroke-width="1"/>
      <line x1="340" y1="445" x2="340" y2="455" stroke="#1a4a6a" stroke-width="1"/>
      <text x="180" y="468" fill="#1a4a6a" font-size="9" font-family="monospace" text-anchor="middle">Ø 260 mm</text>
      <!-- Crosshair center -->
      <circle cx="200" cy="200" r="4" fill="#00e5ff" opacity=".8"/>
      <line x1="185" y1="200" x2="215" y2="200" stroke="#00e5ff" stroke-width=".5" opacity=".6"/>
      <line x1="200" y1="185" x2="200" y2="215" stroke="#00e5ff" stroke-width=".5" opacity=".6"/>
    </svg>

    <!-- HERO CONTENT -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:2rem;">
      <div style="flex:1;min-width:280px;">

        <!-- CFD LEGEND BAR -->
        <div class="fade-up delay-1" style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.75rem;flex-wrap:wrap;">
          <span style="font-family:var(--mono);font-size:.62rem;color:var(--text-dim);letter-spacing:.08em;">LOW</span>
          <div style="height:3px;width:80px;background:linear-gradient(to right,#0066cc,#00e5ff,#00ccaa,#ff6600);flex-shrink:0;"></div>
          <span style="font-family:var(--mono);font-size:.62rem;color:var(--text-dim);letter-spacing:.08em;">HIGH — VELOCITY FIELD</span>
          <span style="width:1px;height:12px;background:var(--border-hi);display:inline-block;margin:0 .25rem;"></span>
          <span style="font-family:var(--mono);font-size:.62rem;color:var(--accent);letter-spacing:.08em;">CFD · ANSYS FLUENT</span>
        </div>

        <h1 class="hero-name fade-up delay-2" style="font-family:var(--cond);font-size:clamp(3rem,10vw,6.5rem);font-weight:900;line-height:.92;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:.5rem;" id="hero-name"></h1>
        <div class="hero-subtitle fade-up delay-3" id="hero-tagline" style="font-family:var(--cond);font-size:clamp(1rem,2.5vw,1.65rem);font-weight:400;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:2rem;margin-top:.5rem;"></div>

        <!-- Bio with engineering annotation style -->
        <div class="fade-up delay-4" style="position:relative;margin-bottom:2.5rem;">
          <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#0066cc,#00e5ff,#00ccaa);"></div>
          <p id="hero-bio" style="font-size:.95rem;color:var(--text-muted);max-width:560px;line-height:1.9;padding-left:1.25rem;"></p>
        </div>

        <div class="hero-btns fade-up delay-5" style="display:flex;gap:1rem;flex-wrap:wrap;" id="hero-btns"></div>
      </div>

      <!-- DESKTOP STATS — styled as spec readout -->
      <div class="hero-stats-col" style="display:flex;flex-direction:column;gap:1.5rem;text-align:right;padding-left:2rem;" id="hero-stats"></div>
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- ABOUT -->
  <section class="section">
    <div class="section-header">
      <span class="section-num">01.</span>
      <h2 class="section-title">About Me</h2>
      <div class="section-line"></div>
    </div>
    <div class="grid-2" style="align-items:start;gap:3rem;">
      <div style="display:flex;gap:2rem;align-items:start;flex-wrap:wrap;">
        <div id="about-photo"></div>
        <div id="about-bio" style="flex:1;min-width:200px;"></div>
      </div>
      <div class="flex-col" id="about-details"></div>
    </div>
  </section>

</div>
<footer id="footer"></footer>

<style>
  @keyframes flow { from{stroke-dashoffset:600} to{stroke-dashoffset:0} }
</style>
<script src="assets/js/data.js"></script>
<script src="assets/js/render.js"></script>
<script>
  renderNav('index');
  renderFooter();

  const parts = DATA.name.split(' ');
  const last = parts.pop();
  document.getElementById('hero-name').innerHTML =
    parts.join(' ') + '<br><span style="color:var(--accent)">' + last + '</span><span class="cursor"></span>';

  document.getElementById('hero-tagline').textContent = DATA.tagline;
  document.getElementById('hero-bio').textContent = DATA.bio[0];

  document.getElementById('hero-btns').innerHTML = `
    <a href="mailto:${DATA.email}" class="btn btn-primary">Get In Touch</a>
    <a href="${DATA.linkedin}" target="_blank" class="btn btn-outline">LinkedIn</a>
    ${DATA.cv_file ? `<a href="${DATA.cv_file}" download class="btn btn-outline">⬇ Download CV</a>` : ''}
  `;

  // Stats styled as engineering spec readout
  document.getElementById('hero-stats').innerHTML = DATA.stats.map(s => `
    <div style="border:1px solid var(--border);padding:.75rem 1rem;min-width:100px;background:var(--surface);position:relative;">
      <div style="position:absolute;top:4px;right:4px;width:6px;height:6px;border-top:1px solid var(--border-hi);border-right:1px solid var(--border-hi);"></div>
      <div class="stat-num">${s.num}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');

  document.getElementById('about-photo').innerHTML = renderPhoto(190);
  document.getElementById('about-bio').innerHTML = DATA.bio.map(b => `<p style="color:var(--text-muted);margin-bottom:1rem;line-height:1.85;">${b}</p>`).join('');
  document.getElementById('about-details').innerHTML = renderDetails();
</script>
</body>
</html>
